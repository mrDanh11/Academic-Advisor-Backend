version: '3.8'

services:
  postgres-db:
    image: postgres:15-alpine
    container_name: postgres_advisor
    restart: always
    environment:
      - POSTGRES_DB=advisor_db
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=123456
    ports:
      - "5442:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin_advisor
    restart: always
    environment:
      - PGADMIN_DEFAULT_EMAIL=admin@admin.com
      - PGADMIN_DEFAULT_PASSWORD=admin
    ports:
      - "8081:80"
    depends_on:
      - postgres-db

volumes:
  postgres_data: