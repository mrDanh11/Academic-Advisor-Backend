spring:
  application:
    name: academic-advisor-backend

  datasource:
    url: jdbc:postgresql://localhost:5442/advisor_db
    username: postgres
    password: 123456
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format_sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect

  liquibase:
    enable: true
    change-log: classpath:db/changelog/db.changelog-master.xml

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
  packages-to-scan: vn.edu.hcmus.fit.learningpath.controller

server:
  port: 8080
